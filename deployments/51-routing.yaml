# PHASE 7: ROUTING — PRIMARY + FALLBACK + OVERFLOW LANES
################################################################################

---
# Premium realtime requests -> H100 first
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-llama-premium
  namespace: tir-inference
spec:
  parentRefs:
    - name: tir-inference-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
          headers:
            - name: x-inference-model
              value: llama-3.1-8b
            - name: x-serving-class
              value: premium-realtime
      backendRefs:
        - group: inference.networking.x-k8s.io
          kind: InferencePool
          name: llama-3-1-8b-h100-premium

---

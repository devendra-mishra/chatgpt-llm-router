################################################################################
# PHASE 1: MODEL LIFECYCLE — KTHENA MANAGED BASE MODELS
################################################################################

---
# 1A. LLAMA 3.1 8B — H100 premium realtime
apiVersion: workload.serving.volcano.sh/v1alpha1
kind: ModelBooster
metadata:
  name: llama-3-1-8b-h100-premium
  namespace: tir-inference
  labels:
    tir.e2enetworks.com/model: llama-3.1-8b
    tir.e2enetworks.com/gpu-tier: h100
    tir.e2enetworks.com/serving-class: premium-realtime
spec:
  name: llama-3-1-8b-h100-premium
  owner: tir-platform
  backend:
    name: llama-3-1-8b-h100-server
    type: vLLM
  modelURI: hf://meta-llama/Llama-3.1-8B-Instruct
  cacheURI: pvc://model-cache-pvc/llama-3-1-8b
  minReplicas: 2
  maxReplicas: 12

  autoscalingPolicy:
    metrics:
      - type: Custom
        custom:
          metricName: vllm_num_requests_waiting
          target:
            type: AverageValue
            averageValue: "4"
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 30
        policies:
          - type: Pods
            value: 2
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Pods
            value: 1
            periodSeconds: 300

  envFrom:
    - secretRef:
        name: hf-token

  workers:
    - type: server
      image: vllm/vllm-openai:v0.8.3
      replicas: 2
      pods: 1
      resources:
        requests:
          cpu: "8"
          memory: 64Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "16"
          memory: 96Gi
          nvidia.com/gpu: "1"
      config:
        served-model-name: llama-3.1-8b
        host: "0.0.0.0"
        port: "8000"
        max-model-len: "8192"
        gpu-memory-utilization: "0.92"
        enable-prefix-caching: ""
        disable-log-requests: ""
      nodeSelector:
        gpu.e2e.ai/family: h100
      podLabels:
        app: vllm
        tir.e2enetworks.com/model: llama-3.1-8b
        tir.e2enetworks.com/gpu-tier: h100
        tir.e2enetworks.com/serving-class: premium-realtime
        tir.e2enetworks.com/context-class: standard
        tir.e2enetworks.com/lora-capable: "true"


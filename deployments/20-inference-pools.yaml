# PHASE 2: INFERENCE POOLS — SPLIT BY MODEL + GPU TIER + SERVING CLASS
################################################################################

---
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferencePool
metadata:
  name: llama-3-1-8b-h100-premium
  namespace: tir-inference
  labels:
    tir.e2enetworks.com/fallback-priority: "100"
spec:
  targetPortNumber: 8000
  selector:
    matchLabels:
      app: vllm
      tir.e2enetworks.com/model: llama-3.1-8b
      tir.e2enetworks.com/gpu-tier: h100
      tir.e2enetworks.com/serving-class: premium-realtime
  extensionRef:
    name: epp-llama-premium

---
apiVersion: inference.networking.x-k8s.io/v1alpha2

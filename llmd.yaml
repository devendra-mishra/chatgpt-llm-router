################################################################################
# PHASE 1B: LARGE MODEL WITH PREFILL / DECODE DISAGGREGATION
################################################################################

---
apiVersion: workload.serving.volcano.sh/v1alpha1
kind: ModelServing
metadata:
  name: deepseek-v3-h100-a100-pd
  namespace: tir-inference
  labels:
    tir.e2enetworks.com/model: deepseek-v3
spec:
  schedulerName: volcano
  replicas: 1

  template:
    restartGracePeriodSeconds: 180
    gangPolicy:
      minRoleReplicas:
        prefill: 2
        decode: 4
    topologyPolicy:
      hyperNode: true

    roles:
      - name: prefill
        replicas: 2
        entryTemplate:
          metadata:
            labels:
              app: vllm
              tir.e2enetworks.com/model: deepseek-v3
              tir.e2enetworks.com/gpu-tier: h100
              tir.e2enetworks.com/serving-class: premium-realtime
              tir.e2enetworks.com/context-class: long
              tir.e2enetworks.com/lora-capable: "false"
              llm-d.ai/role: prefill
          spec:
            nodeSelector:
              gpu.e2e.ai/family: h100
            containers:
              - name: vllm-prefill
                image: vllm/vllm-openai:v0.8.3
                command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
                args:
                  - "--model"
                  - "deepseek-ai/DeepSeek-V3"
                  - "--served-model-name"
                  - "deepseek-v3"
                  - "--port"
                  - "8000"
                  - "--tensor-parallel-size"
                  - "4"
                  - "--max-model-len"
                  - "32768"
                  - "--gpu-memory-utilization"
                  - "0.94"
                env:
                  - name: HUGGING_FACE_HUB_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: hf-token
                        key: token
                resources:
                  requests:
                    cpu: "16"
                    memory: 256Gi
                    nvidia.com/gpu: "4"
                  limits:
                    cpu: "32"
                    memory: 256Gi
                    nvidia.com/gpu: "4"

      - name: decode
        replicas: 4
        entryTemplate:
          metadata:
            labels:
              app: vllm
              tir.e2enetworks.com/model: deepseek-v3
              tir.e2enetworks.com/gpu-tier: a100
              tir.e2enetworks.com/serving-class: premium-realtime
              tir.e2enetworks.com/context-class: long
              tir.e2enetworks.com/lora-capable: "false"
              llm-d.ai/role: decode
          spec:
            nodeSelector:
              gpu.e2e.ai/family: a100
            containers:
              - name: vllm-decode
                image: vllm/vllm-openai:v0.8.3
                command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
                args:
                  - "--model"
                  - "deepseek-ai/DeepSeek-V3"
                  - "--served-model-name"
                  - "deepseek-v3"
                  - "--port"
                  - "8000"
                  - "--tensor-parallel-size"
                  - "2"
                  - "--max-model-len"
                  - "32768"
                  - "--gpu-memory-utilization"
                  - "0.92"
                env:
                  - name: HUGGING_FACE_HUB_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: hf-token
                        key: token
                resources:
                  requests:
                    cpu: "8"
                    memory: 128Gi
                    nvidia.com/gpu: "2"
                  limits:
                    cpu: "16"
                    memory: 128Gi
                    nvidia.com/gpu: "2"



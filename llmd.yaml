################################################################################
#
# TIR GPU-TIER-AWARE PRODUCTION INFERENCE DESIGN
#
# PRINCIPLES
# - Kthena: model lifecycle / rollout / autoscaling / LoRA management
# - Volcano: gang scheduling / topology-aware placement
# - kgateway: TLS / auth / quota / rate-limit / header enrichment
# - llm-d EPP: final endpoint selection inside the selected serving pool
#
# SERVING STRATEGY
# 1. Request classified into a serving class:
#    - premium-realtime
#    - standard-realtime
#    - economy-batch
#    - long-context
#    - lora-dedicated
#
# 2. Route into GPU-specific pools:
#    - h100
#    - a100
#    - l40s
#
# 3. EPP selects best pod using:
#    - queue score
#    - kv cache utilization
#    - prefix cache affinity
#    - LoRA affinity
#    - overflow / fallback preference
#
################################################################################


################################################################################
# PHASE 0: NAMESPACE / SHARED LABELING CONVENTIONS
################################################################################

---
apiVersion: v1
kind: Namespace
metadata:
  name: tir-inference
  labels:
    platform.e2e.ai/component: inference

################################################################################
# LABELING CONVENTIONS
#
# Node labels expected:
#   gpu.e2e.ai/family: h100 | a100 | l40s
#   gpu.e2e.ai/memory: "80g" | "48g"
#   gpu.e2e.ai/interconnect: nvlink | pcie
#   gpu.e2e.ai/cost-tier: premium | standard | economy
#
# Pod labels applied to serving pods:
#   app: vllm
#   tir.e2enetworks.com/model: <model-name>
#   tir.e2enetworks.com/gpu-tier: h100 | a100 | l40s
#   tir.e2enetworks.com/serving-class: premium-realtime | standard-realtime | economy-batch | long-context | lora-dedicated
#   tir.e2enetworks.com/lora-capable: "true" | "false"
#   tir.e2enetworks.com/context-class: standard | long
#   tir.e2enetworks.com/fallback-from: comma-separated pool names (informational)
################################################################################


################################################################################
# PHASE 1: MODEL LIFECYCLE — KTHENA MANAGED BASE MODELS
################################################################################

---
# 1A. LLAMA 3.1 8B — H100 premium realtime
apiVersion: workload.serving.volcano.sh/v1alpha1
kind: ModelBooster
metadata:
  name: llama-3-1-8b-h100-premium
  namespace: tir-inference
  labels:
    tir.e2enetworks.com/model: llama-3.1-8b
    tir.e2enetworks.com/gpu-tier: h100
    tir.e2enetworks.com/serving-class: premium-realtime
spec:
  name: llama-3-1-8b-h100-premium
  owner: tir-platform
  backend:
    name: llama-3-1-8b-h100-server
    type: vLLM
  modelURI: hf://meta-llama/Llama-3.1-8B-Instruct
  cacheURI: pvc://model-cache-pvc/llama-3-1-8b
  minReplicas: 2
  maxReplicas: 12

  autoscalingPolicy:
    metrics:
      - type: Custom
        custom:
          metricName: vllm_num_requests_waiting
          target:
            type: AverageValue
            averageValue: "4"
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 30
        policies:
          - type: Pods
            value: 2
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Pods
            value: 1
            periodSeconds: 300

  envFrom:
    - secretRef:
        name: hf-token

  workers:
    - type: server
      image: vllm/vllm-openai:v0.8.3
      replicas: 2
      pods: 1
      resources:
        requests:
          cpu: "8"
          memory: 64Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "16"
          memory: 96Gi
          nvidia.com/gpu: "1"
      config:
        served-model-name: llama-3.1-8b
        host: "0.0.0.0"
        port: "8000"
        max-model-len: "8192"
        gpu-memory-utilization: "0.92"
        enable-prefix-caching: ""
        disable-log-requests: ""
      nodeSelector:
        gpu.e2e.ai/family: h100
      podLabels:
        app: vllm
        tir.e2enetworks.com/model: llama-3.1-8b
        tir.e2enetworks.com/gpu-tier: h100
        tir.e2enetworks.com/serving-class: premium-realtime
        tir.e2enetworks.com/context-class: standard
        tir.e2enetworks.com/lora-capable: "true"

---

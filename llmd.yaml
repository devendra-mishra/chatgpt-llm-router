          maxPrefixBlocksToMatch: 1024
          lruCapacityPerServer: 125000
      - type: queue-scorer
      - type: max-score-picker
    schedulingProfiles:
      - name: default
        plugins:
          - pluginRef: kv-cache-utilization-scorer
            weight: 3
          - pluginRef: prefix-cache-scorer
            weight: 3

  namespace: tir-inference
data:
  pd-config.yaml: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    featureGates:
      - prepareDataPlugins
    plugins:
      - type: prefill-header-handler
      - type: prefix-based-pd-decider
        parameters:
          nonCachedTokens: 16
      - type: prefix-cache-scorer
      - type: queue-scorer
      - type: prefill-filter
      - type: decode-filter
      - type: pd-profile-handler
      - type: max-score-picker


################################################################################
# PHASE 6: KGATEWAY — AUTH + REQUEST CLASSIFICATION HEADERS
################################################################################

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: tir-inference-gateway
  namespace: tir-inference
spec:
  gatewayClassName: kgateway
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: tir-inference-tls

---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: tir-jwt-auth
  namespace: tir-inference
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: tir-inference-gateway
  jwtAuth:
    providers:
      - name: tir-iam
        issuer: "https://auth.e2enetworks.com"
        audiences:
          - "tir-inference-api"
        jwks:
          remoteJWKS:
            url: "https://auth.e2enetworks.com/.well-known/jwks.json"
            cacheDuration: "300s"
        claimToHeaders:
          - claim: "sub"
            header: "x-user-id"
          - claim: "team_id"
            header: "x-team-id"
          - claim: "project_id"
            header: "x-project-id"
          - claim: "tier"
            header: "x-user-tier"
        tokenSource:
          - headerSource:
              name: "Authorization"
              prefix: "Bearer "

---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayExtension
metadata:
  name: tir-ext-auth
  namespace: tir-inference
spec:
  type: ExtAuth
  extAuth:
    failOpen: false
    grpcService:
      backendRef:
        name: tir-auth-service
        port: 9001

---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: tir-ext-auth-policy
  namespace: tir-inference
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: tir-inference-gateway
  extAuth:
    extensionRef:
      name: tir-ext-auth

---
# Request classifier:
# This component should inspect request body / headers and set:
#   x-inference-model
#   x-serving-class
#   x-context-class
#   x-lora-adapter
#   x-overflow-allowed
#
# Examples:
# - prompt_tokens > 12000             => x-context-class: long
# - adapter present                   => x-serving-class: lora-dedicated
# - paid tier with low-latency flag   => x-serving-class: premium-realtime
# - batch async requests              => x-serving-class: economy-batch
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayExtension
metadata:
  name: tir-request-classifier
  namespace: tir-inference
spec:
  type: ExtProc
  extProc:
    grpcService:
      backendRef:
        name: tir-request-classifier
        port: 9003

---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: tir-request-classifier-policy
  namespace: tir-inference
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: tir-inference-gateway
  extProc:
    extensionRef:
      name: tir-request-classifier


################################################################################
# PHASE 7: ROUTING — PRIMARY + FALLBACK + OVERFLOW LANES
################################################################################

---
# Premium realtime requests -> H100 first
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-llama-premium
  namespace: tir-inference
spec:
  parentRefs:
    - name: tir-inference-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
          headers:
            - name: x-inference-model
              value: llama-3.1-8b
            - name: x-serving-class
              value: premium-realtime
      backendRefs:
        - group: inference.networking.x-k8s.io
          kind: InferencePool
          name: llama-3-1-8b-h100-premium

---
# Standard realtime -> A100 first
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-llama-standard
  namespace: tir-inference
spec:
  parentRefs:
    - name: tir-inference-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
          headers:
            - name: x-inference-model
              value: llama-3.1-8b
            - name: x-serving-class
              value: standard-realtime

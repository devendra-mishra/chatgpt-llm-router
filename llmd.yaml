################################################################################
# PHASE 5: EPP SCORING / FALLBACK / OVERFLOW CONFIG
################################################################################

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: epp-config-llama-premium
  namespace: tir-inference
data:
  config.yaml: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
      - type: queue-scorer
      - type: kv-cache-utilization-scorer
      - type: prefix-cache-scorer
        parameters:
          maxPrefixBlocksToMatch: 512
          lruCapacityPerServer: 62500
      - type: max-score-picker
    schedulingProfiles:
      - name: default
        plugins:
          - pluginRef: queue-scorer
            weight: 2
          - pluginRef: kv-cache-utilization-scorer
            weight: 2
          - pluginRef: prefix-cache-scorer
            weight: 2
          - pluginRef: max-score-picker

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: epp-config-llama-standard
  namespace: tir-inference
data:
  config.yaml: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
      - type: queue-scorer
      - type: kv-cache-utilization-scorer
      - type: prefix-cache-scorer
      - type: max-score-picker
